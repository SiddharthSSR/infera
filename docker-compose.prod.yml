services:
  gateway:
    image: ${INFERA_GATEWAY_IMAGE:?INFERA_GATEWAY_IMAGE is required}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    environment:
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - VASTAI_API_KEY=${VASTAI_API_KEY}
      - INFERA_ADMIN_KEY=${INFERA_ADMIN_KEY:?INFERA_ADMIN_KEY is required}
      - INFERA_ALLOWED_ORIGINS=${INFERA_ALLOWED_ORIGINS:?INFERA_ALLOWED_ORIGINS is required}
      - INFERA_GATEWAY_ADDRESS=${INFERA_GATEWAY_ADDRESS:?INFERA_GATEWAY_ADDRESS is required}
      - INFERA_WORKER_SHARED_TOKEN=${INFERA_WORKER_SHARED_TOKEN:?INFERA_WORKER_SHARED_TOKEN is required}
      - INFERA_RELEASE_ID=${INFERA_RELEASE_ID:?INFERA_RELEASE_ID is required}
      - INFERA_VERSION=${INFERA_RELEASE_ID:?INFERA_RELEASE_ID is required}
      - INFERA_WORKER_PROTOCOL_VERSION=${INFERA_WORKER_PROTOCOL_VERSION:?INFERA_WORKER_PROTOCOL_VERSION is required}
      - INFERA_GATEWAY_REPLICAS=${INFERA_GATEWAY_REPLICAS:-1}
      - INFERA_CONTROL_STATE_DSN=${INFERA_CONTROL_STATE_DSN:?INFERA_CONTROL_STATE_DSN is required}
      - INFERA_CONTROL_STATE_QUERY_TIMEOUT=${INFERA_CONTROL_STATE_QUERY_TIMEOUT:-5s}
      - INFERA_CONTROL_STATE_MAX_OPEN_CONNS=${INFERA_CONTROL_STATE_MAX_OPEN_CONNS:-20}
      - INFERA_CONTROL_STATE_MAX_IDLE_CONNS=${INFERA_CONTROL_STATE_MAX_IDLE_CONNS:-5}
      - INFERA_CONTROL_STATE_CONN_MAX_LIFETIME=${INFERA_CONTROL_STATE_CONN_MAX_LIFETIME:-30m}
      - INFERA_AUDIT_LEDGER_BACKEND=${INFERA_AUDIT_LEDGER_BACKEND:-sqlite}
      - INFERA_AUDIT_LEDGER_DSN=${INFERA_AUDIT_LEDGER_DSN:-}
      - INFERA_AUDIT_LEDGER_MAX_OPEN_CONNS=${INFERA_AUDIT_LEDGER_MAX_OPEN_CONNS:-20}
      - INFERA_AUDIT_LEDGER_MAX_IDLE_CONNS=${INFERA_AUDIT_LEDGER_MAX_IDLE_CONNS:-5}
      - INFERA_AUDIT_LEDGER_CONN_MAX_LIFETIME=${INFERA_AUDIT_LEDGER_CONN_MAX_LIFETIME:-30m}
      - INFERA_PROVIDER_CREDENTIAL_ENCRYPTION_KEY=${INFERA_PROVIDER_CREDENTIAL_ENCRYPTION_KEY:?INFERA_PROVIDER_CREDENTIAL_ENCRYPTION_KEY is required}
      - INFERA_WORKER_IMAGE=${INFERA_WORKER_IMAGE:?INFERA_WORKER_IMAGE is required}
      - INFERA_WORKER_IMAGE_VLLM=${INFERA_WORKER_IMAGE_VLLM:-}
      - INFERA_WORKER_IMAGE_SGLANG=${INFERA_WORKER_IMAGE_SGLANG:-}
      - INFERA_WORKER_IMAGE_TENSORRT_LLM=${INFERA_WORKER_IMAGE_TENSORRT_LLM:-}
      - INFERA_WORKER_IMAGE_MOCK=${INFERA_WORKER_IMAGE_MOCK:-}
      - INFERA_ENABLE_BATCHING=${INFERA_ENABLE_BATCHING:-}
      - INFERA_MAX_BATCH_SIZE=${INFERA_MAX_BATCH_SIZE:-}
      - INFERA_MAX_BATCH_WAIT_MS=${INFERA_MAX_BATCH_WAIT_MS:-}
      - INFERA_AFFINITY_TTL_SECONDS=${INFERA_AFFINITY_TTL_SECONDS:-}
      - INFERA_RATE_LIMIT_REQUESTS_PER_MINUTE=${INFERA_RATE_LIMIT_REQUESTS_PER_MINUTE:-}
      - INFERA_RATE_LIMIT_BURST_SIZE=${INFERA_RATE_LIMIT_BURST_SIZE:-}
      - INFERA_MAX_IN_FLIGHT_REQUESTS=${INFERA_MAX_IN_FLIGHT_REQUESTS:-}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway
      - grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - gateway
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    entrypoint:
      - /bin/sh
      - /etc/alertmanager/render-and-run.sh
    environment:
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:?ALERT_EMAIL_TO is required}
      - ALERT_SMTP_FROM=${ALERT_SMTP_FROM:?ALERT_SMTP_FROM is required}
      - ALERT_SMTP_SMARTHOST=${ALERT_SMTP_SMARTHOST:?ALERT_SMTP_SMARTHOST is required}
      - ALERT_SMTP_USERNAME=${ALERT_SMTP_USERNAME:?ALERT_SMTP_USERNAME is required}
      - ALERT_SMTP_PASSWORD=${ALERT_SMTP_PASSWORD:?ALERT_SMTP_PASSWORD is required}
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./deploy/observability/alertmanager/render-and-run.sh:/etc/alertmanager/render-and-run.sh:ro
      - ./deploy/observability/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://dashboard.inferai.co.in
      - GF_SECURITY_COOKIE_SECURE=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
  grafana_data:

services:
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    environment:
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - VASTAI_API_KEY=${VASTAI_API_KEY}
      - INFERA_ADMIN_KEY=${INFERA_ADMIN_KEY:?INFERA_ADMIN_KEY is required}
      - INFERA_ALLOWED_ORIGINS=${INFERA_ALLOWED_ORIGINS:?INFERA_ALLOWED_ORIGINS is required}
      - INFERA_GATEWAY_ADDRESS=${INFERA_GATEWAY_ADDRESS:?INFERA_GATEWAY_ADDRESS is required}
      - INFERA_WORKER_SHARED_TOKEN=${INFERA_WORKER_SHARED_TOKEN:?INFERA_WORKER_SHARED_TOKEN is required}
      - INFERA_WORKER_IMAGE=${INFERA_WORKER_IMAGE:?INFERA_WORKER_IMAGE is required}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway
      - grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - ./deploy/observability/prometheus/worker_targets.json:/etc/prometheus/worker_targets.json:ro
      - prometheus_data:/prometheus
    depends_on:
      - gateway
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--config.expand-env"
    environment:
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-codingtensor@gmail.com}
      - ALERT_SMTP_FROM=${ALERT_SMTP_FROM:-codingtensor@gmail.com}
      - ALERT_SMTP_SMARTHOST=${ALERT_SMTP_SMARTHOST:-smtp.gmail.com:587}
      - ALERT_SMTP_USERNAME=${ALERT_SMTP_USERNAME:-codingtensor@gmail.com}
      - ALERT_SMTP_PASSWORD=${ALERT_SMTP_PASSWORD:-}
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./deploy/observability/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://dashboard.inferai.co.in
      - GF_SECURITY_COOKIE_SECURE=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  alertmanager_data:
  grafana_data:

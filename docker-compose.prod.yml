services:
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    environment:
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - VASTAI_API_KEY=${VASTAI_API_KEY}
      - INFERA_ADMIN_KEY=${INFERA_ADMIN_KEY:?INFERA_ADMIN_KEY is required}
      - INFERA_ALLOWED_ORIGINS=${INFERA_ALLOWED_ORIGINS:?INFERA_ALLOWED_ORIGINS is required}
      - INFERA_GATEWAY_ADDRESS=${INFERA_GATEWAY_ADDRESS:?INFERA_GATEWAY_ADDRESS is required}
      - INFERA_WORKER_SHARED_TOKEN=${INFERA_WORKER_SHARED_TOKEN:?INFERA_WORKER_SHARED_TOKEN is required}
      - INFERA_WORKER_IMAGE=${INFERA_WORKER_IMAGE:?INFERA_WORKER_IMAGE is required}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

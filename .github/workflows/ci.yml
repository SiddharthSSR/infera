name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - v1-production

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-secrets:
    name: CI Shared Values
    runs-on: ubuntu-latest
    outputs:
      admin_key: ${{ steps.generate.outputs.admin_key }}
    steps:
      - name: Generate bootstrap admin key
        id: generate
        run: echo "admin_key=inf_$(openssl rand -hex 24)" >> "$GITHUB_OUTPUT"

  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run Go tests
        working-directory: go
        run: go test ./...

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python/pyproject.toml

      - name: Install Python dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run Python tests
        working-directory: python
        run: pytest -q

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check generated OpenAI chat contract
        run: node ./scripts/generate-openai-chat-contracts.mjs --check

      - name: Check generated auth access contract
        run: node ./scripts/generate-auth-access-contracts.mjs --check

      - name: Check generated infrastructure dashboard contract
        run: node ./scripts/generate-infrastructure-contracts.mjs --check

      - name: Check generated deployment history contract
        run: node ./scripts/generate-deployment-history-contracts.mjs --check

      - name: Check generated workspace admin contract
        run: node ./scripts/generate-workspace-admin-contracts.mjs --check

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  prod-config:
    name: Production Compose Validation
    runs-on: ubuntu-latest
    needs: ci-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.prod.yml
        env:
          INFERA_ADMIN_KEY: ${{ needs.ci-secrets.outputs.admin_key }}
          INFERA_ALLOWED_ORIGINS: https://example.com
          INFERA_GATEWAY_ADDRESS: https://example.com
          INFERA_WORKER_SHARED_TOKEN: test-worker-token
          INFERA_WORKER_IMAGE: ghcr.io/example/infera-worker:test
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: test-grafana-password
          ALERT_EMAIL_TO: alerts@example.com
          ALERT_SMTP_FROM: alerts@example.com
          ALERT_SMTP_SMARTHOST: smtp.example.com:587
          ALERT_SMTP_USERNAME: alerts@example.com
          ALERT_SMTP_PASSWORD: test-alert-password
          RUNPOD_API_KEY: ""
          VASTAI_API_KEY: ""
          HF_TOKEN: ""
        run: docker compose -f docker-compose.prod.yml config

  prod-smoke:
    name: Production Compose Smoke
    runs-on: ubuntu-latest
    needs: ci-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production compose smoke test
        env:
          INFERA_ADMIN_KEY: ${{ needs.ci-secrets.outputs.admin_key }}
          INFERA_ALLOWED_ORIGINS: https://example.com
          INFERA_GATEWAY_ADDRESS: https://example.com
          INFERA_WORKER_SHARED_TOKEN: test-worker-token
          INFERA_WORKER_IMAGE: ghcr.io/example/infera-worker:test
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: test-grafana-password
          ALERT_EMAIL_TO: alerts@example.com
          ALERT_SMTP_FROM: alerts@example.com
          ALERT_SMTP_SMARTHOST: smtp.example.com:587
          ALERT_SMTP_USERNAME: alerts@example.com
          ALERT_SMTP_PASSWORD: test-alert-password
          RUNPOD_API_KEY: ""
          VASTAI_API_KEY: ""
          HF_TOKEN: ""
          REMOVE_COMPOSE_VOLUMES: "true"
        run: bash ./scripts/compose-smoke-prod.sh

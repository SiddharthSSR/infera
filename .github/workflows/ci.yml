name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - v1-production

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run Go tests
        working-directory: go
        run: go test ./...

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python/pyproject.toml

      - name: Install Python dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run Python tests
        working-directory: python
        run: pytest -q

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  prod-config:
    name: Production Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.prod.yml
        env:
          INFERA_ADMIN_KEY: test-admin-key
          INFERA_ALLOWED_ORIGINS: https://example.com
          INFERA_GATEWAY_ADDRESS: https://example.com
          INFERA_WORKER_SHARED_TOKEN: test-worker-token
          INFERA_WORKER_IMAGE: ghcr.io/example/infera-worker:test
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: test-grafana-password
          RUNPOD_API_KEY: ""
          VASTAI_API_KEY: ""
          HF_TOKEN: ""
        run: docker compose -f docker-compose.prod.yml config

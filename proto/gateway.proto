syntax = "proto3";

package infera.gateway;

option go_package = "github.com/infera/infera/go/pkg/proto/gateway";

import "google/protobuf/timestamp.proto";

// OpenAI-compatible Chat Completion
message ChatCompletionRequest {
  string model = 1;
  repeated ChatMessage messages = 2;
  optional float temperature = 3;
  optional float top_p = 4;
  optional int32 max_tokens = 5;
  repeated string stop = 6;
  optional bool stream = 7;
  optional int64 seed = 8;
  map<string, string> metadata = 9;
}

message ChatMessage {
  string role = 1;
  string content = 2;
  optional string name = 3;
}

message ChatCompletionResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChatChoice choices = 5;
  Usage usage = 6;
}

message ChatChoice {
  int32 index = 1;
  ChatMessage message = 2;
  string finish_reason = 3;
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

// Streaming
message ChatCompletionChunk {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChatChunkChoice choices = 5;
}

message ChatChunkChoice {
  int32 index = 1;
  ChatDelta delta = 2;
  optional string finish_reason = 3;
}

message ChatDelta {
  optional string role = 1;
  optional string content = 2;
}

// Models API
message ListModelsResponse {
  string object = 1;
  repeated ModelObject data = 2;
}

message ModelObject {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string owned_by = 4;
}

// Health
message HealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}

// Error Response
message ErrorResponse {
  ErrorDetail error = 1;
}

message ErrorDetail {
  string message = 1;
  string type = 2;
  optional string code = 3;
}
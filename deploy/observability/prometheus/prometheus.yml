global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: infera_gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: gateway
          env: production

  - job_name: infera_worker
    metrics_path: /metrics
    http_sd_configs:
      - url: http://gateway:8080/internal/prometheus/worker-targets
        refresh_interval: 30s

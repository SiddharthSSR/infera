global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: infera_gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: gateway
          env: production

  - job_name: infera_worker
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/worker_targets.json

global:
  resolve_timeout: 5m
  smtp_smarthost: ${ALERT_SMTP_SMARTHOST}
  smtp_from: ${ALERT_SMTP_FROM}
  smtp_auth_username: ${ALERT_SMTP_USERNAME}
  smtp_auth_password: ${ALERT_SMTP_PASSWORD}
  smtp_require_tls: true

route:
  receiver: email-default
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: email-default
    email_configs:
      - to: ${ALERT_EMAIL_TO}
        send_resolved: true
        headers:
          subject: '[Infera][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        html: '{{ template "infera.default.html" . }}'

templates:
  - /etc/alertmanager/templates/*.tmpl
